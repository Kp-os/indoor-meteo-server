<!DOCTYPE html>
<html lang="uk" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Microclimate System</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<div class="container py-4">
    <header class="pb-3 mb-4 border-bottom">
        <h1 class="display-5 fw-bold neon-title">IOT MICROCLIMATE</h1>
        <p class="text-muted">Система моніторингу та аналітики</p>
    </header>

    <div class="card mb-4 shadow-sm custom-card">
        <div class="card mb-4 shadow-sm custom-card">
            <div class="card-body d-flex flex-wrap align-items-end justify-content-center gap-3">
                <div>
                    <label class="form-label text-muted mb-1">Період від:</label>
                    <input type="datetime-local" id="startDate" class="form-control bg-dark text-white">
                </div>
                <div>
                    <label class="form-label text-muted mb-1">Період до:</label>
                    <input type="datetime-local" id="endDate" class="form-control bg-dark text-white">
                </div>
                <div class="d-flex gap-2">
                    <button class="btn btn-neon px-4" onclick="applyCustomDates()">Показати</button>
                    <button class="btn btn-outline-light px-4" onclick="resetToLive()">Скинути</button>
                </div>
            </div>
        </div>
    </div>

    <div class="card mb-4 shadow-sm custom-card border-bottom-neon">
        <div class="card-body">
            <h5 class="card-title text-white mb-3 text-center">⚙️ Віддалене керування (Уставки)</h5>
            <div class="d-flex flex-wrap align-items-end justify-content-center gap-3">
                <div>
                    <label class="form-label text-muted mb-1">Температура (°C):</label>
                    <input type="number" id="targetTempInput" class="form-control bg-dark text-white" step="0.5">
                </div>
                <div>
                    <label class="form-label text-muted mb-1">Вологість (%):</label>
                    <input type="number" id="targetHumInput" class="form-control bg-dark text-white" step="1">
                </div>
                <div>
                    <label class="form-label text-muted mb-1">Гістерезис (± °C):</label>
                    <input type="number" id="targetDevInput" class="form-control bg-dark text-white" step="0.5">
                </div>
                <div>
                    <button class="btn btn-neon px-4" onclick="saveTargetSettings()">Застосувати</button>
                </div>
            </div>
        </div>
    </div>

    <div class="row text-center mb-4">
        <div class="col-md-4 mb-3">
            <div class="card shadow-sm custom-card border-bottom-neon">
                <div class="card-body">
                    <h6 class="card-title text-muted text-uppercase">Середня температура</h6>
                    <h2 class="display-6 fw-bold" id="avgTemp">-- °C</h2>
                </div>
            </div>
        </div>
        <div class="col-md-4 mb-3">
            <div class="card shadow-sm custom-card border-bottom-blue">
                <div class="card-body">
                    <h6 class="card-title text-muted text-uppercase">Середня вологість</h6>
                    <h2 class="display-6 fw-bold" id="avgHum">-- %</h2>
                </div>
            </div>
        </div>
        <div class="col-md-4 mb-3">
            <div class="card shadow-sm custom-card border-bottom-green">
                <div class="card-body">
                    <h6 class="card-title text-muted text-uppercase">Середній тиск</h6>
                    <h2 class="display-6 fw-bold" id="avgPres">-- hPa</h2>
                </div>
            </div>
        </div>
    </div>

    <div class="row">
        <div class="col-lg-6 mb-4">
            <div class="card shadow-sm custom-card">
                <div class="card-body">
                    <canvas id="tempChart"></canvas>
                </div>
            </div>
        </div>
        <div class="col-lg-6 mb-4">
            <div class="card shadow-sm custom-card">
                <div class="card-body">
                    <canvas id="humChart"></canvas>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="/js/app.js"></script>

</body>
</html>
